<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="JapanEase - A Beginner’s Guide to Japan. Discover Japan’s culture, travel tips, food, and must-visit destinations.">
  <meta name="author" content="Alijah Lucas Espinoza, Shekinah Marcel Puguon">
  <link rel="icon" type="image/png" href="./images/WEBSITEICON.png">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;600;700&display=swap" rel="stylesheet">
  <title>JapanEase | Sign-Up Page</title>

  <style>
:root {
  --autumn-red: #b63e2e;
  --autumn-orange: #d87c3f;
  --autumn-light: #f6e7d8;
  --autumn-dark: #3c2415;
  --autumn-brown: #8a5a44;
}

body {
  margin: 0;
  font-family: 'Zen Old Mincho', serif;
  background-color: var(--autumn-light);
  color: var(--autumn-dark);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* HEADER */
header {
  background: url('https://i.pinimg.com/1200x/d3/c7/1c/d3c71c951b70d5748e1a5187507393f4.jpg') center/cover no-repeat;
  text-align: center;
  padding: 50px 20px;
  position: relative;
}

header img.logo {
  position: absolute;
  top: 15px;
  right: 15px;
  width: 70px;
  height: 70px;
}

header h1 {
  margin: 0;
  font-size: 48px;
}

header h2 {
  margin: 8px 0 0;
  font-size: 22px;
}

/* NAVBAR */
nav {
  height: 40px;
  background: var(--autumn-brown);
  border-bottom: 2px solid var(--autumn-brown);
}

/* MAIN */
main {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 60px 20px;
  background: url('https://i.pinimg.com/1200x/1a/51/f3/1a51f3824c4482b27daf46bb4500834f.jpg') center/cover no-repeat fixed;
}

/* FORM CARD */
.form-box {
  background: rgba(246, 231, 216, 0.95);
  backdrop-filter: blur(10px);
  padding: 45px;
  border-radius: 20px;
  width: 100%;
  max-width: 480px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.35);
  transition: transform 0.3s ease;
}

.form-box:hover {
  transform: translateY(-5px);
}

.form-box h2 {
  text-align: center;
  margin-bottom: 25px;
  font-size: 26px;
}

/* FORM GROUPS */
.form-group {
  margin-bottom: 20px;
}

label {
  display: block;
  font-weight: 600;
  font-size: 14px;
}

/* INPUTS */
input, select, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  border-radius: 10px;
  border: 1px solid var(--autumn-brown);
  font-family: inherit;
  font-size: 14px;
  background: white;
}

/* INPUT FOCUS */
input:focus,
select:focus,
textarea:focus {
  outline: none;
  border-color: var(--autumn-red);
  box-shadow: 0 0 0 2px rgba(182, 62, 46, 0.2);
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  border: none;
  background: linear-gradient(135deg, var(--autumn-red), var(--autumn-orange));
  color: white;
  font-size: 16px;
  border-radius: 25px;
  cursor: pointer;
  margin-top: 10px;
  font-weight: bold;
  transition: all 0.3s ease;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 16px rgba(0,0,0,0.25);
}

/* FOOTER */
footer {
  background-color: var(--autumn-brown);
  color: var(--autumn-light);
  text-align: center;
  padding: 18px;
  font-size: 14px;
  margin-top: auto;
}

footer a {
  color: var(--autumn-light);
  text-decoration: none;
  margin: 0 8px;
}

footer a:hover {
  color: var(--autumn-orange);
  text-decoration: underline;
}
  </style>
</head>

<body>

<header>
  <img src="images/WEBSITEICON.png" class="logo">
  <h1>JapanEase</h1>
  <h2>Create Your Travel Profile</h2>
</header>

<nav>
</nav>

<main>
  <div class="form-box">
    <h2>Sign Up</h2>

    <form id="signupForm">
      
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="name" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required>
      </div>

      <div class="form-group">
        <label>Favorite City</label>
        <select id="city">
          <option>Tokyo</option>
          <option>Kyoto</option>
          <option>Osaka</option>
        </select>
      </div>

      <div class="form-group">
        <label>Travel Goal</label>
        <textarea id="goal" rows="3"></textarea>
      </div>

      <button type="submit" onclick="playSound()">Create Profile</button>
    </form>
  </div>
</main>

<footer>
  <p>© 2025 JapanEase. All Rights Reserved.</p>
  <p>Authors: Alijah Lucas Espinoza, Shekinah Marcel Puguon</p>
  <p>
    <a href="https://www.facebook.com/pisaymc">Facebook</a> |
    <a href="https://www.instagram.com/shexks._/">Shekinah IG</a> |
    <a href="https://www.instagram.com/allyespozo/">Alijah IG</a>
  </p>
</footer>

<script src="signup.js"></script>

</body>
</html>
